baseURL = "https://wineshe.com/"
languageCode = "zh-CN"
title = "酒社诗坛"
theme = "hugo-theme-diary-main"

[author]
name = "wineshe"
email = "wineshe@qq.com"

[params]
subtitle = "酒社我为敌，诗坛子有功"
description = "酒社我为敌，诗坛子有功"
enableGiscus = false
disableDarkmode = false
walineServer = "https://com.wineshe.com"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"

[permalinks]
  posts = "/posts/:slug/"
  categories = "/categories/:slug/"
  tags = "/tags/:slug/"

[[menu.main]]
  url = "/categories"
  name = "Categories"
  weight = 2

[[menu.main]]
  url = "/tags"
  name = "Tags"
  weight = 3

[[menu.main]]
  url = "/posts"
  name = "Archive"
  weight = 1

[[menu.main]]
  url = "/about"
  name = "About"
  weight = 4