<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒社诗坛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fff;
            font-family: "SimSun", "STSong", "Songti SC", serif;
        }
        .container {
            text-align: center;
        }
        .title {
            font-size: 120px;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: 20px;
            line-height: 1.4;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            /* 模拟毛笔效果的CSS */
            background: linear-gradient(135deg, #1a1a1a 0%, #333 50%, #1a1a1a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 24px;
            color: #666;
            margin-top: 20px;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">酒社诗坛</div>
        <div class="subtitle">WINESHE.COM</div>
    </div>
</body>
</html>
